name: Deploy (dev)

# Runs on a merge into develop, and on demand. The full CI gate must pass, then the web image is
# built with the dev API base URL baked into the bundle, pushed to GHCR, and the dev VM pulls and
# restarts the container.
on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/fortecompute/fq-web
  # The browser calls the API directly, so this base URL is baked into the bundle at build time.
  VITE_API_BASE_URL: https://farmquest-api.dev.fortecompute.com

jobs:
  # 1. The existing CI gate: build, test, lint, secret scan, dependency scan. The run fails if any fail.
  ci:
    name: CI gate
    uses: ./.github/workflows/ci.yml

  # 2 and 3. Build the image from the repo Dockerfile, tag it :dev and the commit SHA, and push both.
  build-and-push:
    name: Build and push image
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          build-args: |
            VITE_API_BASE_URL=${{ env.VITE_API_BASE_URL }}
          tags: |
            ${{ env.IMAGE }}:dev
            ${{ env.IMAGE }}:${{ github.sha }}

  # 4. Deploy to the dev VM: pull the new image and restart just the web container.
  deploy:
    name: Deploy to dev VM
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Pull and restart over SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.DEV_SSH_HOST }}
          username: ${{ secrets.DEV_SSH_USER }}
          key: ${{ secrets.DEV_SSH_KEY }}
          script: |
            cd ~/farmquest-dev
            docker compose -f docker-compose.dev.yml pull fq-web
            docker compose -f docker-compose.dev.yml up -d fq-web
