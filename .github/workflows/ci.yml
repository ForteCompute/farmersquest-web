name: CI

# Pull requests into develop or main run the full gate. A push to develop (a merged PR) is handled by
# the dev deploy workflow, which reuses this gate (workflow_call) before building and deploying. A
# version tag promotes the release through staging then production. Direct pushes to main do not
# happen under the branching policy; main moves by merging a release branch and then tagging.
on:
  pull_request:
    branches: [develop, main]
  push:
    tags:
      - 'v*'
  # Reusable by the dev deploy workflow, so the gate has a single definition.
  workflow_call:

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  build-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Typecheck and build
        run: npm run build
      - name: Test
        run: npm run test

  lint:
    name: Lint and format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run format:check
      - name: Em dash check
        run: npm run check:no-em-dash

  contract-drift:
    name: API contract drift
    runs-on: ubuntu-latest
    # Regenerate the typed client from the API repository's committed OpenAPI document (the source of
    # truth in git) and fail if the committed client is out of date, so the web can never silently
    # build against a stale contract. Reading from git, not a running API, means a dev-API outage can
    # never break this check. The document is read through the GitHub Contents API using a token with
    # read access to the API repository, provided as the API_CONTRACT_TOKEN repository secret. The
    # token is never hardcoded.
    env:
      API_CONTRACT_TOKEN: ${{ secrets.API_CONTRACT_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      - name: Check the committed client matches the contract
        run: |
          if [ -z "$API_CONTRACT_TOKEN" ]; then
            echo "Missing required secret API_CONTRACT_TOKEN."
            echo "Add it under Settings > Secrets and variables > Actions as a repository secret."
            echo "It must be a token with read access to the farmersquest-api repository contents."
            exit 1
          fi
          npm run check:contract

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan for secrets
        run: gitleaks detect --source . --redact --verbose

  dependency-scan:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install
        run: npm ci
      # Fail the build on a known high or critical severity vulnerability in the shipped
      # (production) dependency tree. Dev-only tooling is excluded because it never reaches the
      # browser bundle; keep it current separately.
      - name: Audit dependencies
        run: npm audit --omit=dev --audit-level=high

  deploy-staging:
    name: Deploy to staging (stub)
    runs-on: ubuntu-latest
    needs: [build-test, lint, contract-drift, secret-scan, dependency-scan]
    # A version tag (created on main from a release branch) starts the promotion path.
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      # TODO(infra): wire the real staging deploy once hosting is chosen.
      - name: Deploy placeholder
        run: echo "Promote ${{ github.ref_name }} to staging would run here. Target to be configured when hosting is chosen."

  deploy-production:
    name: Deploy to production (stub)
    runs-on: ubuntu-latest
    # Production follows staging: staging must succeed first.
    needs: [deploy-staging]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4
      # TODO(infra): wire the real production deploy once hosting is chosen.
      - name: Deploy placeholder
        run: echo "Promote ${{ github.ref_name }} to production would run here. Target to be configured when hosting is chosen."
