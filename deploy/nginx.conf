# nginx config for the FarmersQuest web SPA, used by the runtime stage of the Dockerfile. It serves
# the static build, keeps client-side routing working on a refresh, caches the hashed assets for a
# long time while never caching index.html, and applies the same security headers as the API.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers, matching the API. add_header does not inherit into a location that sets its
    # own headers, so these three are repeated in the cache-control locations below.
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header Referrer-Policy no-referrer always;

    # Hashed build assets are content addressed: a given file name never changes, so cache for a year.
    location /assets/ {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # The entry document is small and must always be revalidated so a new deploy is picked up at once.
    location = /index.html {
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy no-referrer always;
        add_header Cache-Control "no-cache" always;
    }

    # Single-page app: unknown paths fall back to index.html so deep links survive a refresh.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
